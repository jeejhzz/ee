<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dnotitia Speed Quiz</title>
  <style>
    :root {
      --brand-navy: #001529;
      --brand-orange: #ff6b00;
      --ink: #172033;
      --muted: #657189;
      --line: #dde5f0;
      --paper: #f6f8fb;
      --white: #ffffff;
      --mint: #1fba8a;
      --cyan: #18a9c9;
      --danger: #e44949;
      --shadow: 0 18px 44px rgba(0, 21, 41, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    button {
      font: inherit;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .panel-wrap {
      background: var(--paper);
      width: min(100%, 880px);
    }

    .panel {
      width: min(100%, 820px);
      margin: 0 auto;
      background: var(--white);
      border: 1px solid rgba(0, 21, 41, 0.08);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .quiz-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 28px clamp(24px, 4vw, 42px);
      background: var(--brand-navy);
      color: var(--white);
    }

    .quiz-title {
      margin: 0;
      font-size: clamp(30px, 5vw, 50px);
      line-height: 1;
      letter-spacing: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .badge {
      min-width: 96px;
      border-radius: 999px;
      color: var(--brand-navy);
      background: #edf4fb;
      border: 1px solid #d7e5f3;
      font-weight: 800;
      font-size: 13px;
      padding: 9px 13px;
      text-align: center;
    }

    .progress {
      flex: 1;
      height: 9px;
      background: #e7edf4;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress > span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--brand-orange), #ff9a3d);
      border-radius: inherit;
      transition: width 260ms ease;
    }

    .chip-assembly {
      padding: 22px clamp(24px, 4vw, 42px) 2px;
      background: linear-gradient(180deg, #fbfcfe 0%, #fff 100%);
      border-bottom: 1px solid rgba(221, 229, 240, 0.72);
    }

    .chip-frame {
      position: relative;
      width: min(100%, 330px);
      aspect-ratio: 4 / 3;
      margin: 0 auto 14px;
      overflow: hidden;
      border-radius: 8px;
      background: #f7f9fc;
      border: 1px solid rgba(215, 229, 243, 0.74);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.86);
    }

    .chip-piece {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.12;
      filter: grayscale(1) blur(0.6px);
      transition: transform 520ms cubic-bezier(0.2, 0.85, 0.2, 1), opacity 300ms ease, filter 300ms ease;
    }

    .chip-piece-1 {
      clip-path: inset(0 66.66% 0 0);
      transform: translateX(-32px) rotate(-3deg);
    }

    .chip-piece-2 {
      clip-path: inset(0 33.33% 0 33.33%);
      transform: translateY(28px) scale(0.98);
    }

    .chip-piece-3 {
      clip-path: inset(0 0 0 66.66%);
      transform: translateX(32px) rotate(3deg);
    }

    .chip-frame.assembled-1 .chip-piece-1,
    .chip-frame.assembled-2 .chip-piece-1,
    .chip-frame.assembled-2 .chip-piece-2,
    .chip-frame.assembled-3 .chip-piece {
      opacity: 1;
      filter: none;
      transform: translate(0, 0) rotate(0deg) scale(1);
    }

    .chip-slots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 10px;
    }

    .chip-slot {
      width: 28px;
      height: 4px;
      border-radius: 999px;
      background: #dfe7f0;
      transition: background 240ms ease;
    }

    .chip-frame.assembled-1 ~ .chip-slots .chip-slot:nth-child(1),
    .chip-frame.assembled-2 ~ .chip-slots .chip-slot:nth-child(-n + 2),
    .chip-frame.assembled-3 ~ .chip-slots .chip-slot {
      background: var(--brand-orange);
    }

    .content {
      padding: clamp(24px, 4vw, 42px);
    }

    .question {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.28;
      letter-spacing: 0;
      color: var(--brand-navy);
      word-break: keep-all;
    }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 28px;
    }

    .option {
      min-height: 82px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--ink);
      cursor: pointer;
      text-align: left;
      transition: transform 160ms ease, border 160ms ease, box-shadow 160ms ease;
    }

    .option:hover,
    .option:focus-visible {
      outline: none;
      transform: translateY(-2px);
      border-color: rgba(255, 107, 0, 0.55);
      box-shadow: 0 12px 30px rgba(0, 21, 41, 0.1);
    }

    .option[disabled] {
      cursor: default;
      transform: none;
      opacity: 0.78;
      box-shadow: none;
    }

    .num {
      flex: 0 0 34px;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #eef3f8;
      color: var(--brand-navy);
      font-weight: 900;
    }

    .option.correct {
      border-color: rgba(31, 186, 138, 0.65);
      background: #f0fff9;
    }

    .option.correct .num {
      background: var(--mint);
      color: #fff;
    }

    .option.wrong {
      border-color: rgba(228, 73, 73, 0.5);
      background: #fff4f4;
    }

    .option.wrong .num {
      background: var(--danger);
      color: #fff;
    }

    .explain {
      display: none;
      margin-top: 22px;
      padding: 18px;
      border-radius: 8px;
      border: 1px solid #dbe8f3;
      background: #f6fbff;
      line-height: 1.65;
      color: #344158;
      word-break: keep-all;
    }

    .explain.show {
      display: block;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-top: 26px;
    }

    .score {
      color: var(--muted);
      font-weight: 700;
      flex: 1;
      text-align: center;
    }

    .primary {
      border: 0;
      border-radius: 8px;
      min-height: 48px;
      padding: 0 20px;
      background: var(--brand-orange);
      color: #fff;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(255, 107, 0, 0.24);
    }

    .primary:disabled {
      opacity: 0.45;
      cursor: default;
      box-shadow: none;
    }

    .secondary {
      background: var(--brand-navy);
      box-shadow: 0 14px 28px rgba(0, 21, 41, 0.18);
    }

    .celebration {
      display: none;
      position: relative;
      min-height: 520px;
      text-align: center;
      padding: clamp(38px, 6vw, 68px) clamp(24px, 5vw, 56px);
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 107, 0, 0.11), transparent 34%),
        linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    }

    .celebration.show {
      display: block;
    }

    .fireworks {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .celebration-content {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      min-height: 360px;
    }

    .celebration-chip {
      width: min(100%, 330px);
      border-radius: 8px;
      border: 1px solid rgba(215, 229, 243, 0.82);
      box-shadow: 0 22px 52px rgba(0, 21, 41, 0.12);
      margin-bottom: 28px;
    }

    .celebration h2 {
      margin: 0;
      color: var(--brand-navy);
      font-size: clamp(38px, 7vw, 72px);
      letter-spacing: 0;
    }

    .celebration p {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: clamp(16px, 2.2vw, 22px);
      font-weight: 800;
    }

    .celebration .primary {
      margin-top: 34px;
      min-height: 66px;
      min-width: min(100%, 320px);
      font-size: clamp(21px, 3.5vw, 30px);
    }

    .result {
      display: none;
      text-align: center;
      padding: clamp(48px, 8vw, 88px) clamp(24px, 5vw, 56px);
    }

    .result.show {
      display: block;
    }

    .result h2 {
      margin: 18px 0 0;
      color: var(--brand-navy);
      font-size: clamp(38px, 7vw, 72px);
      letter-spacing: 0;
    }

    .result-logo {
      width: min(220px, 58vw);
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .winner {
      margin: 28px auto 30px;
      max-width: 620px;
      min-height: 92px;
      display: grid;
      place-items: center;
      border: 2px solid rgba(255, 107, 0, 0.45);
      border-radius: 8px;
      background: #fff7ef;
      color: var(--brand-navy);
      font-size: clamp(30px, 6vw, 56px);
      font-weight: 950;
      word-break: keep-all;
    }

    .draw-button {
      min-height: 72px;
      min-width: min(100%, 360px);
      margin-top: 34px;
      font-size: clamp(22px, 4vw, 34px);
    }

    .result-actions {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 34px;
    }

    .result-actions .primary {
      width: min(100%, 260px);
      min-height: 72px;
      margin-top: 0;
      font-size: clamp(22px, 4vw, 34px);
    }

    .result-actions #drawBtn {
      background: var(--brand-orange);
      box-shadow: 0 14px 28px rgba(255, 107, 0, 0.24);
    }

    .result-actions #restartBtn {
      background: var(--brand-navy);
      box-shadow: 0 14px 28px rgba(0, 21, 41, 0.2);
    }

    .hidden {
      display: none;
    }

    @media (max-width: 860px) {
      .shell {
        padding: 18px;
      }
    }

    @media (max-width: 560px) {
      .options {
        grid-template-columns: 1fr;
      }

      .quiz-head {
        align-items: flex-start;
        flex-direction: column-reverse;
      }

      .topbar,
      .actions,
      .result-actions {
        align-items: stretch;
        flex-direction: column;
      }

      .badge {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel-wrap">
      <div class="panel" id="quizPanel">
        <div class="quiz-head">
          <h1 class="quiz-title">Dnotitia Speed Quiz</h1>
        </div>
        <div class="topbar" id="quizTop">
          <div class="badge" id="stepBadge">Q1 / 3</div>
          <div class="progress" aria-label="진행률"><span id="progressBar"></span></div>
          <div class="badge" id="scoreBadge">0점</div>
        </div>

        <div class="chip-assembly" id="chipAssembly">
          <div class="chip-frame assembled-0" id="chipFrame" aria-label="V110 조립 진행">
            <img class="chip-piece chip-piece-1" src="v110-web.jpg" alt="" />
            <img class="chip-piece chip-piece-2" src="v110-web.jpg" alt="" />
            <img class="chip-piece chip-piece-3" src="v110-web.jpg" alt="" />
          </div>
          <div class="chip-slots" aria-hidden="true">
            <span class="chip-slot"></span>
            <span class="chip-slot"></span>
            <span class="chip-slot"></span>
          </div>
        </div>

        <div class="content" id="quizContent">
          <h2 class="question" id="question"></h2>
          <div class="options" id="options"></div>
          <div class="explain" id="explain"></div>
          <div class="actions">
            <button class="primary secondary" id="prevBtn" disabled>이전 문제</button>
            <div class="score" id="feedback">정답을 골라주세요.</div>
            <button class="primary" id="nextBtn" disabled>다음 문제</button>
          </div>
        </div>

        <div class="celebration" id="celebration">
          <canvas class="fireworks" id="fireworksCanvas" aria-hidden="true"></canvas>
          <div class="celebration-content">
            <img class="celebration-chip" src="v110-web.jpg" alt="V110" />
            <h2>축하합니다!</h2>
            <p>저희의 칩을 선물로 드리겠습니다.</p>
            <button class="primary" id="celebrationBtn">경품 뽑기</button>
          </div>
        </div>

        <div class="result" id="result">
          <img class="result-logo" src="dnotitia-logo-full.png" alt="Dnotitia" />
          <h2 id="resultTitle">경품 추첨</h2>
          <div class="winner hidden" id="winner"></div>
          <div class="result-actions">
            <button class="primary draw-button" id="drawBtn">경품 뽑기</button>
            <button class="primary hidden" id="restartBtn">다시 시작</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const questions = [
      {
        title: "다음 중 디노티시아가 출시한 첫 번째 VDPU(Vector Data Processing Unit)의 이름은?",
        options: ["V110", "RTX5090", "AK47", "GV80"],
        answer: 0,
        explain: "정답은 V110입니다. 디노티시아의 VDPU는 벡터 검색과 데이터 연산을 가속하는 전용 반도체로, AI 데이터 인프라의 성능을 높이기 위해 개발되었습니다."
      },
      {
        title: "다음 중 디노티시아의 제품 및 서비스가 아닌 것은?",
        options: ["MNEMOS", "DNA", "LANDHORSE", "VDPU"],
        answer: 2,
        explain: "정답은 LANDHORSE입니다. MNEMOS는 온디바이스 생성형 AI 솔루션, DNA는 자체 LLM 모델, VDPU는 벡터 데이터 연산 가속기입니다. SEAHORSE는 디노티시아의 고성능 벡터 데이터베이스 솔루션이지만, LANDHORSE는 제품명이 아닙니다."
      },
      {
        title: "다음 중 디노티시아에 대한 설명으로 틀린 것은?",
        options: [
          "2023년에 설립되었고 2027년을 목표로 IPO를 준비하고 있다.",
          "Series A 단계에서 900억원의 투자금을 유치했다.",
          "CB Insights가 선정한 2025 Global AI 100에 선정되었다.",
          "전체 임직원 수는 140명 이상이며 그 중 R&D 인력은 10% 미만이다."
        ],
        answer: 3,
        explain: "정답은 4번입니다. 2026년 6월 기준 디노티시아 전체 임직원은 145명이며, 그중 R&D 인력 비중은 75%입니다. 기술 중심 회사라서 R&D 비중이 매우 높습니다."
      }
    ];

    let index = 0;
    let answered = [];
    let selected = false;

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const explainEl = document.getElementById("explain");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const feedbackEl = document.getElementById("feedback");
    const progressBar = document.getElementById("progressBar");
    const stepBadge = document.getElementById("stepBadge");
    const scoreBadge = document.getElementById("scoreBadge");
    const quizContent = document.getElementById("quizContent");
    const quizTop = document.getElementById("quizTop");
    const chipAssembly = document.getElementById("chipAssembly");
    const chipFrame = document.getElementById("chipFrame");
    const celebration = document.getElementById("celebration");
    const fireworksCanvas = document.getElementById("fireworksCanvas");
    const celebrationBtn = document.getElementById("celebrationBtn");
    const result = document.getElementById("result");
    const resultTitle = document.getElementById("resultTitle");
    const winner = document.getElementById("winner");
    const drawBtn = document.getElementById("drawBtn");
    const restartBtn = document.getElementById("restartBtn");
    const prizes = [
      { name: "스타벅스 기프트카드", chance: 10 },
      { name: "꼬북칩", chance: 15 },
      { name: "허니버터칩", chance: 15 },
      { name: "스윙칩", chance: 15 },
      { name: "포카칩", chance: 15 },
      { name: "포테토칩", chance: 15 },
      { name: "콘칩", chance: 15 }
    ];
    const fireworksContext = fireworksCanvas.getContext("2d");
    let fireworksAnimation = null;
    let particles = [];

    function resizeFireworks() {
      const rect = celebration.getBoundingClientRect();
      fireworksCanvas.width = Math.max(1, Math.floor(rect.width));
      fireworksCanvas.height = Math.max(1, Math.floor(rect.height));
    }

    function launchFirework() {
      const x = Math.random() * fireworksCanvas.width;
      const y = 70 + Math.random() * Math.max(80, fireworksCanvas.height * 0.42);
      const colors = ["#ff6b00", "#001529", "#18a9c9", "#1fba8a", "#ffb15f"];

      for (let i = 0; i < 34; i += 1) {
        const angle = (Math.PI * 2 * i) / 34;
        const speed = 1.4 + Math.random() * 2.8;
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 54 + Math.random() * 22,
          age: 0,
          color: colors[Math.floor(Math.random() * colors.length)]
        });
      }
    }

    function renderFireworks() {
      fireworksContext.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);

      if (Math.random() < 0.075) {
        launchFirework();
      }

      particles = particles.filter((particle) => particle.age < particle.life);
      particles.forEach((particle) => {
        particle.age += 1;
        particle.x += particle.vx;
        particle.y += particle.vy;
        particle.vy += 0.035;

        const alpha = 1 - particle.age / particle.life;
        fireworksContext.globalAlpha = alpha;
        fireworksContext.fillStyle = particle.color;
        fireworksContext.beginPath();
        fireworksContext.arc(particle.x, particle.y, 2.2, 0, Math.PI * 2);
        fireworksContext.fill();
      });
      fireworksContext.globalAlpha = 1;
      fireworksAnimation = requestAnimationFrame(renderFireworks);
    }

    function startFireworks() {
      stopFireworks();
      particles = [];
      resizeFireworks();
      launchFirework();
      launchFirework();
      fireworksAnimation = requestAnimationFrame(renderFireworks);
    }

    function stopFireworks() {
      if (fireworksAnimation) {
        cancelAnimationFrame(fireworksAnimation);
        fireworksAnimation = null;
      }
      particles = [];
      fireworksContext.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);
    }

    function updateChipAssembly(parts) {
      const assembledParts = Math.max(0, Math.min(parts, questions.length));
      chipFrame.className = `chip-frame assembled-${assembledParts}`;
    }

    function currentScore() {
      return answered.filter(Boolean).length;
    }

    function pickPrize() {
      const totalChance = prizes.reduce((sum, prize) => sum + prize.chance, 0);
      const randomPoint = Math.random() * totalChance;
      let cumulative = 0;
      return prizes.find((prize) => {
        cumulative += prize.chance;
        return randomPoint < cumulative;
      });
    }

    function renderQuestion() {
      const q = questions[index];
      selected = Boolean(answered[index]);
      questionEl.textContent = q.title;
      explainEl.textContent = "";
      explainEl.classList.remove("show");
      feedbackEl.textContent = selected ? "" : "정답을 골라주세요.";
      prevBtn.disabled = index === 0;
      nextBtn.disabled = !selected;
      nextBtn.textContent = index === questions.length - 1 ? "결과 보기" : "다음 문제";
      stepBadge.textContent = `Q${index + 1} / ${questions.length}`;
      scoreBadge.textContent = `${currentScore()}점`;
      progressBar.style.width = `${(index / questions.length) * 100}%`;
      updateChipAssembly(currentScore());
      optionsEl.innerHTML = "";

      q.options.forEach((text, optionIndex) => {
        const button = document.createElement("button");
        button.className = "option";
        button.type = "button";
        button.innerHTML = `<span class="num">${optionIndex + 1}</span><strong>${text}</strong>`;
        button.addEventListener("click", () => choose(optionIndex));
        if (selected) {
          button.disabled = true;
          if (optionIndex === q.answer) button.classList.add("correct");
        }
        optionsEl.appendChild(button);
      });

      if (selected) {
        explainEl.textContent = q.explain;
        explainEl.classList.add("show");
      }
    }

    function choose(optionIndex) {
      if (selected) return;
      const q = questions[index];
      const optionButtons = [...optionsEl.querySelectorAll(".option")];

      if (optionIndex !== q.answer) {
        optionButtons[optionIndex].classList.add("wrong");
        optionButtons[optionIndex].disabled = true;
        feedbackEl.textContent = "오답입니다.";
        return;
      }

      selected = true;
      answered[index] = true;
      optionButtons.forEach((button, buttonIndex) => {
        button.disabled = true;
        if (buttonIndex === q.answer) button.classList.add("correct");
      });
      feedbackEl.textContent = "";
      scoreBadge.textContent = `${currentScore()}점`;
      updateChipAssembly(currentScore());
      explainEl.textContent = q.explain;
      explainEl.classList.add("show");
      nextBtn.disabled = false;
      progressBar.style.width = `${((index + 1) / questions.length) * 100}%`;
    }

    function showCelebration() {
      quizContent.classList.add("hidden");
      quizTop.classList.add("hidden");
      chipAssembly.classList.add("hidden");
      result.classList.remove("show");
      celebration.classList.add("show");
      celebrationBtn.textContent = "경품 뽑기";
      celebrationBtn.disabled = false;
      startFireworks();
    }

    function showResult() {
      stopFireworks();
      celebration.classList.remove("show");
      quizContent.classList.add("hidden");
      quizTop.classList.add("hidden");
      chipAssembly.classList.add("hidden");
      result.classList.add("show");
      resultTitle.textContent = "경품 추첨";
      winner.textContent = "";
      winner.classList.add("hidden");
      drawBtn.classList.remove("hidden");
      drawBtn.textContent = "경품 뽑기";
      restartBtn.classList.add("hidden");
    }

    nextBtn.addEventListener("click", () => {
      if (index < questions.length - 1) {
        index += 1;
        renderQuestion();
      } else {
        showCelebration();
      }
    });

    prevBtn.addEventListener("click", () => {
      if (index > 0) {
        index -= 1;
        renderQuestion();
      }
    });

    celebrationBtn.addEventListener("click", () => {
      showResult();
    });

    drawBtn.addEventListener("click", () => {
      drawBtn.disabled = true;
      winner.classList.remove("hidden");
      let tick = 0;
      const spin = setInterval(() => {
        winner.textContent = tick % 2 === 0 ? "경품 뽑는 중" : "경품 뽑는 중...";
        tick += 1;
      }, 80);

      setTimeout(() => {
        clearInterval(spin);
        const selectedPrize = pickPrize();
        winner.textContent = selectedPrize.name;
        drawBtn.classList.remove("hidden");
        drawBtn.textContent = "한번 더 뽑기";
        restartBtn.classList.remove("hidden");
        drawBtn.disabled = false;
      }, 1500);
    });

    function resetQuiz() {
      index = 0;
      answered = [];
      quizContent.classList.remove("hidden");
      quizTop.classList.remove("hidden");
      chipAssembly.classList.remove("hidden");
      celebration.classList.remove("show");
      result.classList.remove("show");
      stopFireworks();
      renderQuestion();
    }

    restartBtn.addEventListener("click", () => {
      resetQuiz();
    });

    renderQuestion();
  </script>
</body>
</html>
